name: Deploy Frontend to Page Branch

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_SEPOLIA_RPC_URL: ${{ secrets.VITE_SEPOLIA_RPC_URL }}
          VITE_MAINNET_RPC_URL: ${{ secrets.VITE_MAINNET_RPC_URL }}
          VITE_SUPPLY_CHAIN_ADDRESS: ${{ secrets.VITE_SUPPLY_CHAIN_ADDRESS }}
          VITE_NIOBIUM_DID_ADDRESS: ${{ secrets.VITE_NIOBIUM_DID_ADDRESS }}
          VITE_BATTERY_TRACKING_ADDRESS: ${{ secrets.VITE_BATTERY_TRACKING_ADDRESS }}
          VITE_VEHICLE_TRACKING_ADDRESS: ${{ secrets.VITE_VEHICLE_TRACKING_ADDRESS }}
          VITE_CARBON_CREDIT_ADDRESS: ${{secrets.VITE_CARBON_CREDIT_ADDRESS}}
          VITE_WALLETCONNECT_PROJECT_ID: ${{ secrets.VITE_WALLETCONNECT_PROJECT_ID }}
          VITE_OPERATOR_ADDRESS: ${{ secrets.VITE_OPERATOR_ADDRESS }}
          VITE_DEPLOY_FROM_BLOCK: ${{ secrets.VITE_DEPLOY_FROM_BLOCK }}
      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Create or checkout page branch
        run: |
          git checkout -b page || git checkout page

      - name: Copy build to temporary location
        run: |
          mkdir -p /tmp/frontend-build
          cp -r frontend/dist/* /tmp/frontend-build/
          cp -r frontend/dist/.[!.]* /tmp/frontend-build/ 2>/dev/null || true

      - name: Clear page branch
        run: |
          git rm -rf . || true
          git clean -fdx

      - name: Copy build to root
        run: |
          cp -r /tmp/frontend-build/* .
          cp -r /tmp/frontend-build/.[!.]* . 2>/dev/null || true

      - name: Add README for page branch
        run: |
          echo "# NiobiumChain Frontend" > README.md
          echo "" >> README.md
          echo "Este branch contém o build de produção do frontend." >> README.md
          echo "" >> README.md
          echo "## Deploy" >> README.md
          echo "Deploy automático via GitHub Actions." >> README.md

      - name: Commit and push
        run: |
          git add .
          git commit -m "Deploy frontend build - $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push origin page --force
